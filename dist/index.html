<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Wizard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-desktop">
    <div id="app">
        <header class="top-nav">
            <div class="app-logo">QUIZ WIZARD</div>

            <nav class="menu-bar">
                
                <div class="menu-item-container">
                    <button class="menu-item active" data-menu="question-bank"></button>
                    <div class="submenu">
                        <div class="submenu-item" data-action="qb-new"></div>
                        <div class="submenu-item" data-action="qb-open"></div>
                        <div class="submenu-item" data-action="qb-edit"></div>
                        <div class="submenu-item" data-action="qb-save"></div>
                        <div class="submenu-item" data-action="qb-save-as"></div>
                        <div class="submenu-item" data-action="qb-optimize"></div>
                    </div>
                </div>

                <div class="menu-item-container">
                    <button class="menu-item" data-menu="exam-setting"></button>
                    <div class="submenu">
                        <div class="submenu-item" data-action="ex-load-bank"></div>
                        <div class="submenu-item" data-action="ex-load-students"></div>
                        <div class="submenu-item" data-action="ex-change-scope"></div>
                        <div class="submenu-item" data-action="ex-save-paper"></div>
                    </div>
                </div>

                <div class="menu-item-container">
                    <button class="menu-item" data-menu="student-list"></button>
                    <div class="submenu">
                        <div class="submenu-item" data-action="sl-open"></div>
                        <div class="submenu-item" data-action="sl-edit"></div>
                        <div class="submenu-item" data-action="sl-save"></div>
                        <div class="submenu-item" data-action="sl-save-as"></div>
                    </div>
                </div>

                <div class="menu-item-container">
                    <button class="menu-item" data-menu="self-study"></button>
                    <div class="submenu">
                        <div class="submenu-item" data-action="ss-load-bank"></div>
                        <div class="submenu-item" data-action="ss-change-scope"></div>
                        <div class="submenu-item" data-action="ss-change-grading"></div>
                        <div class="submenu-item" data-action="ss-start"></div>
                    </div>
                </div>

                <div class="menu-item-container">
                    <button class="menu-item" data-menu="settings"></button>
                    <div class="submenu">
                        <div class="submenu-item" data-action="st-path-bank"></div>
                        <div class="submenu-item" data-action="st-path-student"></div>
                        <div class="submenu-item" data-action="st-theme"></div>
                        <div class="submenu-item" data-action="st-font"></div>
                        <div class="submenu-item" data-action="st-lang"></div>
                    </div>
                </div>

                <div class="menu-item-container">
                    <button class="menu-item" data-menu="information"></button>
                    <div class="submenu">
                        <div class="submenu-item" data-action="in-help"></div>
                        <div class="submenu-item" data-action="in-info-soft"></div>
                        <div class="submenu-item" data-action="in-info-copy"></div>
                    </div>
                </div>

            </nav>
        </header>

        <main id="view-container">
            </main>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
