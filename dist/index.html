<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizWiz</title>
    <link rel="stylesheet" href="style.css">
    <script src="lib/pdfmake.min.js"></script>
    <script src="lib/vfs_fonts.js"></script>
    <!--
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
    -->
</head>
<body class="theme-blue">
    <div id="app">
        <header class="top-nav">
            <div class="app-logo">
                <img src="QuizWiz_128.png" alt="QuizWiz Logo" class="logo-img">
                QuizWiz
            </div>

            <nav class="menu-bar">
                
                <div class="menu-item-container">
                    <button class="menu-item active" data-menu="question-bank"></button>
                    <div class="submenu">
                        <div class="submenu-item" data-action="qb-new"></div>
                        <div class="submenu-item" data-action="qb-open"></div>
                        <div class="submenu-item" data-action="qb-save"></div>
                        <div class="submenu-item" data-action="qb-save-as"></div>
                        <div class="menu-separator"></div>
                        <div class="submenu-item" data-action="qb-edit-question-bank"></div>
                        <div class="submenu-item" data-action="qb-optimize"></div>
                        <div class="submenu-item" data-action="qb-stat"></div>
                        <div class="menu-separator"></div>
                        <div class="submenu-item" data-action="qb-edit-header"></div>
                    </div>
                </div>

                <div class="menu-item-container">
                    <button class="menu-item" data-menu="exam-setting"></button>
                    <div class="submenu">
                        <div class="submenu-item" data-action="ex-load-bank"></div>
                        <div class="submenu-item" data-action="ex-load-students"></div>
                        <div class="submenu-item disabled" data-action="ex-set-scope"></div>
                        <div class="submenu-item" data-action="ex-save-paper"></div>
                    </div>
                </div>

                <div class="menu-item-container">
                    <button class="menu-item" data-menu="student-list"></button>
                    <div class="submenu">
                        <div class="submenu-item" data-action="sl-new"></div>
                        <div class="submenu-item" data-action="sl-open"></div>
                        <div class="submenu-item" data-action="sl-save"></div>
                        <div class="submenu-item" data-action="sl-save-as"></div>
                        <div class="menu-separator"></div>
                        <div class="submenu-item" data-action="sl-edit-student-list"></div>
                        <div class="submenu-item" data-action="sl-optimize"></div>
                    </div>
                </div>

                <div class="menu-item-container">
                    <button class="menu-item" data-menu="self-study"></button>
                    <div class="submenu">
                        <div class="submenu-item" data-action="ss-load-bank"></div>
                        <div class="submenu-item" data-action="ss-set-scope"></div>
                        <div class="submenu-item" data-action="ss-set-scoring-rules"></div>
                        <div class="menu-separator"></div>
                        <div class="submenu-item" data-action="ss-start"></div>
                    </div>
                </div>

                <div class="menu-item-container">
                    <button class="menu-item" data-menu="settings"></button>
                    <div class="submenu">
                        <div class="submenu-item" data-action="st-theme"></div>
                        <div class="submenu-item" data-action="st-font"></div>
                        <div class="submenu-item" data-action="st-lang"></div>
                    </div>
                </div>

                <div class="menu-item-container">
                    <button class="menu-item" data-menu="information"></button>
                    <div class="submenu">
                        <div class="submenu-item" data-action="in-help"></div>
                        <div class="menu-separator"></div>
                        <div class="submenu-item" data-action="in-info-soft"></div>
                        <div class="submenu-item" data-action="in-info-copy"></div>
                        <div class="submenu-item" data-action="in-info-license"></div>
                    </div>
                </div>

            </nav>
        </header>

        <main id="view-container">
            </main>
    </div>

    <!-- 채점 방식 설정 대화상자 추가 -->
    <dialog id="scoring-dialog" class="modal">
        <div class="modal-content">
            <h3 id="scoring-dialog-title">채점 방식 설정</h3>
            <div class="radio-group" id="scoring-radio-group">
                <!-- 라디오 버튼은 JS에서 동적으로 생성됨 -->
            </div>
            <div class="modal-actions">
                <button id="scoring-cancel-btn">취소</button>
                <button id="scoring-confirm-btn">확인</button>
            </div>
        </div>
    </dialog>

    <!-- 글꼴 설정 대화상자 추가 -->
    <dialog id="font-dialog" class="modal">
        <div class="modal-content">
            <h3 id="font-dialog-title">글꼴 설정 / Font Settings</h3>
            <div id="font-selector-container">
                <label for="font-input" id="font-label">시스템 글꼴 선택:</label>
                <div class="custom-dropdown">
                    <div class="dropdown-input-wrapper">
                        <input type="text" id="font-input">
                        <button id="font-dropdown-btn">▼</button>
                    </div>
                    <div id="font-dropdown-list" class="dropdown-list">
                        <!-- 글꼴 목록이 여기에 동적으로 추가됩니다 -->
                    </div>
                </div>
                <p id="font-guide"></p>
            </div>
            <div class="modal-actions" style="margin-top: 20px;">
                <button id="font-cancel-btn">취소</button>
                <button id="font-confirm-btn">확인</button>
            </div>
        </div>
    </dialog>

    <!-- 언어 설정 대화상자 추가 -->
    <dialog id="lang-dialog" class="modal">
        <div class="modal-content">
            <h3 id="lang-dialog-title">언어 설정 / Language Settings</h3>
            <div class="radio-group">
                <label><input type="radio" name="lang" value="ko"> 한국어 (Korean)</label>
                <label><input type="radio" name="lang" value="en"> English</label>
                <label><input type="radio" name="lang" value="ru"> Русский (Russian)</label>
                <label><input type="radio" name="lang" value="ky"> Кыргызча (Kyrgyz)</label>
            </div>
            <div class="modal-actions">
                <button id="lang-cancel-btn">취소</button>
                <button id="lang-confirm-btn">확인</button>
            </div>
        </div>
    </dialog>

    <!-- 테마 설정 대화상자 추가 -->
    <dialog id="theme-dialog" class="modal">
        <div class="modal-content">
            <h3 id="theme-dialog-title">테마 설정 / Theme Settings</h3>
            <div class="radio-group">
                <label><input type="radio" name="theme" value="theme-blue"> 파란색 분위기 (Blue Theme)</label>
                <label><input type="radio" name="theme" value="theme-light"> 밝은 분위기 (Light Theme)</label>
                <label><input type="radio" name="theme" value="theme-dark"> 어두운 분위기 (Dark Theme)</label>
            </div>
            <div class="modal-actions">
                <button id="theme-cancel-btn">취소</button>
                <button id="theme-confirm-btn">확인</button>
            </div>
        </div>
    </dialog>

    <!-- 답안지 제출 확인 대화상자 추가 -->
    <dialog id="submit-confirm-dialog" class="modal">
        <div class="modal-content">
            <h3 id="submit-dialog-title">답안지 제출 / Submit Exam</h3>
            <p id="submit-dialog-msg" style="font-size: 13px; margin: 20px 0;">정말로 답안지를 제출하시겠습니까? 제출 후에는 수정할 수 없습니다.</p>
            <div class="modal-actions">
                <button id="submit-cancel-btn">취소</button>
                <button id="submit-confirm-btn">확인</button>
            </div>
        </div>
    </dialog>

    <!-- 채점 결과 대화상자 추가 -->
    <dialog id="score-result-dialog" class="modal">
        <div class="modal-content">
            <h3 id="score-dialog-title">시험 결과 / Exam Result</h3>
            <div id="score-display-area" style="padding: 30px; text-align: center;">
                <span id="final-score" style="font-size: 48px; font-weight: bold; color: #0078d4;">0</span>
                <span style="font-size: 24px; font-weight: bold; color: #555;"> / 100</span>
            </div>
            <div class="modal-actions">
                <button id="score-confirm-btn">확인</button>
            </div>
        </div>
    </dialog>

    <!-- 통계 결과 대화상자 추가 -->
    <dialog id="stat-result-dialog" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <h3 id="stat-dialog-title"></h3>
            <div id="stat-content-area" style="padding: 15px; font-size: 13px; line-height: 1.6;">
                <div id="stat-summary" style="margin-bottom: 15px; font-weight: bold; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;"></div>
                <div id="stat-categories" style="margin-bottom: 15px;"></div>
                <div id="stat-correct-answers" style="max-height: 300px; overflow-y: auto;"></div>
            </div>
            <div class="modal-actions">
                <button id="stat-confirm-btn">확인</button>
            </div>
        </div>
    </dialog>

    <!-- 새 문제은행 생성 확인 대화상자 추가 -->
    <dialog id="confirm-new-qb-dialog" class="modal">
        <div class="modal-content">
            <h3 id="qb-new-confirm-title"></h3>
            <p id="qb-new-confirm-msg" style="font-size: 13px; margin: 20px 0;"></p>
            <div class="modal-actions">
                <button id="qb-new-no-btn">아니요</button>
                <button id="qb-new-yes-btn">예</button>
            </div>
        </div>
    </dialog>

    <!-- 새 학생명단 생성 확인 대화상자 추가 -->
    <dialog id="confirm-new-sl-dialog" class="modal">
        <div class="modal-content">
            <h3 id="sl-confirm-new-title"></h3>
            <p id="sl-confirm-new-msg" style="font-size: 13px; margin: 20px 0;"></p>
            <div class="modal-actions">
                <button id="sl-confirm-new-no-btn">아니요</button>
                <button id="sl-confirm-new-yes-btn">예</button>
            </div>
        </div>
    </dialog>

    <!-- 범위 설정 대화상자 추가 -->
    <dialog id="scope-dialog" class="modal">
        <div class="modal-content">
            <h3 id="scope-dialog-title">범위 설정</h3>
            <div style="margin-bottom: 15px; font-size: 13px;">
                <p id="scope-guide">출제범위와 문항수를 정해 주세요.</p>
            </div>
            <div style="margin-bottom: 15px; display: flex; align-items: center; gap: 5px;">
                <input type="number" id="scope-start" style="width: 3.5em; text-align: center;" min="1">
                <span>~</span>
                <input type="number" id="scope-end" style="width: 3.5em; text-align: center;" min="1">
            </div>
            <div style="margin-bottom: 20px; display: flex; align-items: center; gap: 5px;">
                <label id="scope-count-label" for="scope-count">문항수:</label>
                <input type="number" id="scope-count" style="width: 3.5em; text-align: center;" min="1">
            </div>
            <div class="modal-actions">
                <button id="scope-cancel-btn">취소</button>
                <button id="scope-confirm-btn">확인</button>
            </div>
        </div>
    </dialog>

    <!-- 저작권 정보 대화상자 -->
    <dialog id="in-info-copy-dialog">
        <div class="modal-content">
            <h3 id="in-info-copy-title">저작권 정보</h3>
            <p id="in-info-copy-msg" style="text-align: center; margin: 20px 0;"></p>
            <div class="modal-actions">
                <button id="in-info-copy-confirm-btn">확인</button>
            </div>
        </div>
    </dialog>

    <!-- 라이센스 정보 대화상자 -->
    <dialog id="in-info-license-dialog">
        <div class="modal-content">
            <h3 id="in-info-license-title">라이센스 정보</h3>
            <p id="in-info-license-msg" style="text-align: center; margin: 20px 0; font-size: 13px;"></p>
            <div class="modal-actions">
                <button id="in-info-license-confirm-btn">확인</button>
            </div>
        </div>
    </dialog>

    <!-- 소프트웨어 정보 대화상자 -->
    <dialog id="in-info-soft-dialog" class="modal">
        <div class="modal-content">
            <h3 id="in-info-soft-title">소프트웨어 정보</h3>
            <div id="in-info-soft-msg" style="text-align: center; margin: 20px 0;">
                <img src="QuizWiz_128.png" alt="QuizWiz Logo" style="width: 128px; height: 128px; margin-bottom: 10px;">
                <p id="in-info-soft-version" style="font-weight: bold; font-size: 16px; margin: 0;">QuizWiz ver. 1.0</p>
            </div>
            <div class="modal-actions">
                <button id="in-info-soft-confirm-btn">확인</button>
            </div>
        </div>
    </dialog>

    <script type="module" src="main.js"></script>
</body>
</html>
